<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>期货标的池</title>
    <script>
      (function () {
        const key = `theme:${location.pathname}`;
        let theme = "dark";
        try {
          const saved = localStorage.getItem(key);
          if (saved === "light" || saved === "dark") theme = saved;
        } catch (_) {}
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="/static/terminal.css" />
    <style>
      input {
        min-width: 160px;
      }
      table {
        margin-top: 16px;
      }
      th,
      td {
        padding: 10px;
      }
      .msg {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>期货标的池配置</h2>
    <div class="muted">数据源：AkShare Sina 期货日线。仅落库 none（不复权）价格，且与 ETF/场外基金/宏观数据完全隔离。</div>
    <div class="muted" style="margin-top: 6px">
      <a href="/">ETF 候选池</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/off-fund-pool">场外基金候选池</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/research/futures">期货研究</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/research">ETF 研究</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/research/off-fund">场外基金研究</a>
    </div>

    <div style="margin-top: 16px" class="row">
      <div>
        <label>期货代码</label>
        <input id="code" placeholder="如 RB0 / IF0" />
      </div>
      <div>
        <label>名称</label>
        <input id="name" placeholder="如 螺纹钢主连" />
      </div>
      <div>
        <label>开始日期</label>
        <input id="start" placeholder="YYYYMMDD (可空)" />
      </div>
      <div>
        <label>结束日期</label>
        <input id="end" placeholder="YYYYMMDD (可空)" />
      </div>
      <div>
        <label>交易单位</label>
        <input id="contractMultiplier" placeholder="如 10" />
      </div>
      <div>
        <label>报价单位</label>
        <input id="priceUnit" placeholder="如 元/吨" />
      </div>
      <div>
        <label>最小变动价位</label>
        <input id="minPriceTick" placeholder="如 1" />
      </div>
      <div>
        <label>最低保证金率</label>
        <input id="minMarginRatio" placeholder="如 0.12（12%）" />
      </div>
      <div style="min-width: 320px;">
        <label>标签（逗号分隔）</label>
        <input id="tags" placeholder="留空将按品种自动分类" />
      </div>
      <button id="save">保存/更新</button>
      <div>
        <label>获取方式</label>
        <select id="fetchType">
          <option value="incremental" selected>增量</option>
          <option value="full">全量</option>
        </select>
      </div>
      <button id="fetchAll">抓取全部</button>
      <button id="selectAll">全选</button>
      <button id="selectNone">取消全选</button>
      <button id="selectInvert">反选</button>
      <button id="fetchSelected">抓取所选</button>
      <button id="deleteSelected">删除所选</button>
    </div>

    <div id="msg" class="msg"></div>

    <table>
      <thead>
        <tr>
          <th>选择</th>
          <th>代码</th>
          <th>名称</th>
          <th>合约参数</th>
          <th>标签</th>
          <th>区间</th>
          <th>抓取状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <script>
      (function initThemeToggle() {
        const key = `theme:${location.pathname}`;
        const html = document.documentElement;
        const nextTheme = () => (html.getAttribute("data-theme") === "light" ? "dark" : "light");
        const apply = (theme) => {
          html.setAttribute("data-theme", theme);
          try { localStorage.setItem(key, theme); } catch (_) {}
          const btn = document.getElementById("themeToggle");
          if (btn) btn.textContent = theme === "dark" ? "切换白天" : "切换黑夜";
        };
        document.addEventListener("DOMContentLoaded", () => {
          const btn = document.createElement("button");
          btn.id = "themeToggle";
          btn.className = "theme-toggle";
          btn.type = "button";
          btn.addEventListener("click", () => apply(nextTheme()));
          document.body.appendChild(btn);
          apply(html.getAttribute("data-theme") || "dark");
        });
      })();

      const api = (path, opts) => fetch(`/api${path}`, { headers: { "Content-Type": "application/json" }, ...opts });
      const $ = (id) => document.getElementById(id);
      const setMsg = (t) => ($("msg").textContent = t || "");
      const selected = new Set();
      const parseNullableNumber = (id) => {
        const raw = String(($(id) && $(id).value) || "").trim();
        if (!raw) return null;
        const v = Number(raw);
        return Number.isFinite(v) ? v : null;
      };
      const parseTags = () => {
        const raw = String(($("tags") && $("tags").value) || "").trim();
        if (!raw) return null;
        const vals = raw.split(",").map((x) => x.trim()).filter(Boolean);
        return vals.length ? vals : null;
      };
      const getFetchType = () => {
        const v = String(($("fetchType") && $("fetchType").value) || "incremental").trim().toLowerCase();
        return v === "full" ? "full" : "incremental";
      };

      function syncBulkActionButtons() {
        const hasSel = selected.size > 0;
        if ($("fetchSelected")) $("fetchSelected").disabled = !hasSel;
        if ($("deleteSelected")) $("deleteSelected").disabled = !hasSel;
      }

      function statusClass(s) {
        if (!s) return "status-null";
        if (s === "success") return "status-success";
        if (s === "failed") return "status-failed";
        return "";
      }

      function fetchStatusText(status, message) {
        const st = String(status || "").trim().toLowerCase();
        const msg = String(message || "").trim().toLowerCase();

        if (!st) return "未抓取";
        if (st === "failed") return "抓取失败";
        if (st !== "success") return st;

        if (msg.includes("mode=incremental->full")) return "增量回退全量成功";
        if (
          msg.includes("no new futures data to fetch") ||
          (msg.includes("no futures data in requested range") && msg.includes("mode=incremental"))
        ) {
          return "增量无新数据";
        }
        if (msg.includes("mode=full")) return "全量抓取成功";
        if (msg.includes("mode=incremental")) return "增量抓取成功";
        return "抓取成功";
      }

      async function refresh() {
        const resp = await api(`/futures?adjust=none`, { method: "GET" });
        const data = await resp.json();
        const tbody = $("tbody");
        tbody.innerHTML = "";
        if (!Array.isArray(data) || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="muted">候选池为空：请先保存代码/名称。</td></tr>`;
          syncBulkActionButtons();
          return;
        }
        for (const it of data) {
          const tr = document.createElement("tr");
          const cfgRange = `${it.start_date || "-"} ~ ${it.end_date || "-"}`;
          const dataRange = it.last_data_start_date && it.last_data_end_date ? `${it.last_data_start_date} ~ ${it.last_data_end_date}` : "没有";
          const st = it.last_fetch_status || "";
          const msg = it.last_fetch_message || "";
          const stText = fetchStatusText(st, msg);
          const checked = selected.has(it.code) ? "checked" : "";
          const margin = (it.min_margin_ratio == null || !Number.isFinite(Number(it.min_margin_ratio)))
            ? "-"
            : `${(Number(it.min_margin_ratio) * 100).toFixed(2)}%`;
          const multiplier = (it.contract_multiplier == null || !Number.isFinite(Number(it.contract_multiplier)))
            ? "-"
            : String(Number(it.contract_multiplier));
          const tick = (it.min_price_tick == null || !Number.isFinite(Number(it.min_price_tick)))
            ? "-"
            : String(Number(it.min_price_tick));
          const punit = it.price_unit ? String(it.price_unit) : "-";
          const tags = Array.isArray(it.tags) && it.tags.length ? it.tags.join(", ") : "-";
          tr.innerHTML = `
            <td><input type="checkbox" data-act="sel" data-code="${it.code}" ${checked} /></td>
            <td>${it.code}</td>
            <td>${it.name}</td>
            <td><div>保证金率：${margin}</div><div class="muted">单位：${multiplier} / 报价：${punit} / 最小变动：${tick}</div></td>
            <td>${tags}</td>
            <td><div>${cfgRange}</div><div class="muted">已抓取（none）：${dataRange}</div></td>
            <td class="${statusClass(st)}">${stText} <span class="muted">${msg ? "· " + msg : ""}</span></td>
            <td>
              <div class="actions">
                <button data-act="edit" data-code="${it.code}">编辑</button>
                <button data-act="fetch" data-code="${it.code}">抓取</button>
                <button data-act="del" data-code="${it.code}">删除</button>
              </div>
            </td>
          `;
          tr.dataset.item = JSON.stringify(it);
          tbody.appendChild(tr);
        }
        syncBulkActionButtons();
      }

      $("save").addEventListener("click", async () => {
        setMsg("");
        const payload = {
          code: $("code").value.trim(),
          name: $("name").value.trim(),
          start_date: $("start").value.trim() || null,
          end_date: $("end").value.trim() || null,
          min_margin_ratio: parseNullableNumber("minMarginRatio"),
          contract_multiplier: parseNullableNumber("contractMultiplier"),
          price_unit: $("priceUnit").value.trim() || null,
          min_price_tick: parseNullableNumber("minPriceTick"),
          tags: parseTags(),
        };
        const resp = await api("/futures", { method: "POST", body: JSON.stringify(payload) });
        const text = await resp.text();
        if (!resp.ok) return setMsg(text);
        $("code").value = "";
        $("name").value = "";
        $("start").value = "";
        $("end").value = "";
        $("minMarginRatio").value = "";
        $("contractMultiplier").value = "";
        $("priceUnit").value = "";
        $("minPriceTick").value = "";
        $("tags").value = "";
        await refresh();
      });

      $("fetchAll").addEventListener("click", async () => {
        const fetchType = getFetchType();
        setMsg(`futures fetch-all (${fetchType})...`);
        const resp = await api("/futures/fetch-all", { method: "POST", body: JSON.stringify({ fetch_type: fetchType }) });
        const text = await resp.text();
        if (!resp.ok) return setMsg(text);
        setMsg(text);
        await refresh();
      });

      $("selectAll").addEventListener("click", async () => {
        const resp = await api(`/futures?adjust=none`, { method: "GET" });
        const data = await resp.json();
        for (const it of data) selected.add(it.code);
        await refresh();
        syncBulkActionButtons();
      });
      $("selectNone").addEventListener("click", async () => {
        selected.clear();
        await refresh();
        syncBulkActionButtons();
      });
      $("selectInvert").addEventListener("click", async () => {
        const resp = await api(`/futures?adjust=none`, { method: "GET" });
        const data = await resp.json();
        const next = new Set();
        for (const it of data) if (!selected.has(it.code)) next.add(it.code);
        selected.clear();
        for (const x of next) selected.add(x);
        await refresh();
        syncBulkActionButtons();
      });

      $("fetchSelected").addEventListener("click", async () => {
        const codes = Array.from(selected);
        if (codes.length === 0) return setMsg("未选择任何期货标的。");
        const fetchType = getFetchType();
        setMsg(`futures fetch-selected (${fetchType}): ${codes.join(", ")} ...`);
        const resp = await api("/futures/fetch-selected", {
          method: "POST",
          body: JSON.stringify({ codes, fetch_type: fetchType }),
        });
        const text = await resp.text();
        if (!resp.ok) return setMsg(text);
        setMsg(text);
        await refresh();
      });

      $("deleteSelected").addEventListener("click", async () => {
        const codes = Array.from(selected);
        if (codes.length === 0) return setMsg("未选择任何期货标的。");
        if (!confirm(`确认删除所选 ${codes.length} 个期货标的池记录？\n${codes.join(", ")}`)) return;
        setMsg(`正在删除所选 ${codes.length} 个标的...`);
        const failed = [];
        for (const code of codes) {
          try {
            const resp = await api(`/futures/${code}`, { method: "DELETE" });
            if (!resp.ok) {
              const text = await resp.text();
              failed.push(`${code}: ${text}`);
              continue;
            }
            selected.delete(code);
          } catch (err) {
            failed.push(`${code}: ${String(err)}`);
          }
        }
        await refresh();
        if (failed.length > 0) {
          setMsg(`部分删除失败（${failed.length}/${codes.length}）：${failed.join(" | ")}`);
        } else {
          setMsg(`删除成功：共 ${codes.length} 个标的。`);
        }
      });

      $("tbody").addEventListener("click", async (e) => {
        const btn = e.target.closest("button");
        const cb = e.target.closest('input[type="checkbox"][data-act="sel"]');
        if (cb) {
          const code = cb.getAttribute("data-code");
          if (cb.checked) selected.add(code);
          else selected.delete(code);
          syncBulkActionButtons();
          return;
        }
        if (!btn) return;
        const act = btn.getAttribute("data-act");
        const code = btn.getAttribute("data-code");
        const tr = btn.closest("tr");
        const it = tr && tr.dataset.item ? JSON.parse(tr.dataset.item) : null;
        if (act === "del") {
          if (!confirm(`删除期货标的 ${code}？\n\n注意：会同时删除期货标的池记录与期货价格表数据（none）。`)) return;
          const resp = await api(`/futures/${code}`, { method: "DELETE" });
          const text = await resp.text();
          if (!resp.ok) return setMsg(text);
          setMsg(text);
          await refresh();
          syncBulkActionButtons();
        }
        if (act === "edit" && it) {
          $("code").value = it.code;
          $("name").value = it.name;
          $("start").value = it.start_date || "";
          $("end").value = it.end_date || "";
          $("minMarginRatio").value = it.min_margin_ratio == null ? "" : String(it.min_margin_ratio);
          $("contractMultiplier").value = it.contract_multiplier == null ? "" : String(it.contract_multiplier);
          $("priceUnit").value = it.price_unit || "";
          $("minPriceTick").value = it.min_price_tick == null ? "" : String(it.min_price_tick);
          $("tags").value = Array.isArray(it.tags) ? it.tags.join(", ") : "";
          setMsg("已载入到表单，修改后点“保存/更新”。");
        }
        if (act === "fetch") {
          const fetchType = getFetchType();
          setMsg(`futures fetch ${code} (${fetchType})...`);
          const resp = await api(`/futures/${code}/fetch`, {
            method: "POST",
            body: JSON.stringify({ fetch_type: fetchType }),
          });
          const text = await resp.text();
          if (!resp.ok) return setMsg(text);
          setMsg(text);
          await refresh();
        }
      });

      syncBulkActionButtons();
      refresh().catch((e) => setMsg(String(e)));
    </script>
  </body>
</html>
