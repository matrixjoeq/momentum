<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>期货标的池</title>
    <script>
      (function () {
        const key = `theme:${location.pathname}`;
        let theme = "dark";
        try {
          const saved = localStorage.getItem(key);
          if (saved === "light" || saved === "dark") theme = saved;
        } catch (_) {}
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="/static/terminal.css" />
    <style>
      input {
        min-width: 160px;
      }
      table {
        margin-top: 16px;
      }
      th,
      td {
        padding: 10px;
      }
      .msg {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>期货标的池配置</h2>
    <div class="muted">数据源：AkShare Sina 期货日线。仅落库 none（不复权）价格，且与 ETF/场外基金/宏观数据完全隔离。</div>
    <div class="muted" style="margin-top: 6px">
      <a href="/">ETF 候选池</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/off-fund-pool">场外基金候选池</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/research/futures">期货研究</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/research">ETF 研究</a>
      <span style="margin: 0 6px;">|</span>
      <a href="/research/off-fund">场外基金研究</a>
    </div>

    <div style="margin-top: 16px" class="row">
      <div>
        <label>期货代码</label>
        <input id="code" placeholder="如 RB0 / IF0" />
      </div>
      <div>
        <label>名称</label>
        <input id="name" placeholder="如 螺纹钢主连" />
      </div>
      <div>
        <label>开始日期</label>
        <input id="start" placeholder="YYYYMMDD (可空)" />
      </div>
      <div>
        <label>结束日期</label>
        <input id="end" placeholder="YYYYMMDD (可空)" />
      </div>
      <button id="save">保存/更新</button>
      <button id="fetchAll">抓取全部</button>
      <button id="selectAll">全选</button>
      <button id="selectNone">取消全选</button>
      <button id="selectInvert">反选</button>
      <button id="fetchSelected">抓取所选</button>
      <button id="deleteSelected">删除所选</button>
    </div>

    <div id="msg" class="msg"></div>

    <table>
      <thead>
        <tr>
          <th>选择</th>
          <th>代码</th>
          <th>名称</th>
          <th>区间</th>
          <th>抓取状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <script>
      (function initThemeToggle() {
        const key = `theme:${location.pathname}`;
        const html = document.documentElement;
        const nextTheme = () => (html.getAttribute("data-theme") === "light" ? "dark" : "light");
        const apply = (theme) => {
          html.setAttribute("data-theme", theme);
          try { localStorage.setItem(key, theme); } catch (_) {}
          const btn = document.getElementById("themeToggle");
          if (btn) btn.textContent = theme === "dark" ? "切换白天" : "切换黑夜";
        };
        document.addEventListener("DOMContentLoaded", () => {
          const btn = document.createElement("button");
          btn.id = "themeToggle";
          btn.className = "theme-toggle";
          btn.type = "button";
          btn.addEventListener("click", () => apply(nextTheme()));
          document.body.appendChild(btn);
          apply(html.getAttribute("data-theme") || "dark");
        });
      })();

      const api = (path, opts) => fetch(`/api${path}`, { headers: { "Content-Type": "application/json" }, ...opts });
      const $ = (id) => document.getElementById(id);
      const setMsg = (t) => ($("msg").textContent = t || "");
      const selected = new Set();

      function syncBulkActionButtons() {
        const hasSel = selected.size > 0;
        if ($("fetchSelected")) $("fetchSelected").disabled = !hasSel;
        if ($("deleteSelected")) $("deleteSelected").disabled = !hasSel;
      }

      function statusClass(s) {
        if (!s) return "status-null";
        if (s === "success") return "status-success";
        if (s === "failed") return "status-failed";
        return "";
      }

      async function refresh() {
        const resp = await api(`/futures?adjust=none`, { method: "GET" });
        const data = await resp.json();
        const tbody = $("tbody");
        tbody.innerHTML = "";
        if (!Array.isArray(data) || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="muted">候选池为空：请先保存代码/名称。</td></tr>`;
          syncBulkActionButtons();
          return;
        }
        for (const it of data) {
          const tr = document.createElement("tr");
          const cfgRange = `${it.start_date || "-"} ~ ${it.end_date || "-"}`;
          const dataRange = it.last_data_start_date && it.last_data_end_date ? `${it.last_data_start_date} ~ ${it.last_data_end_date}` : "没有";
          const st = it.last_fetch_status || "";
          const msg = it.last_fetch_message || "";
          const checked = selected.has(it.code) ? "checked" : "";
          tr.innerHTML = `
            <td><input type="checkbox" data-act="sel" data-code="${it.code}" ${checked} /></td>
            <td>${it.code}</td>
            <td>${it.name}</td>
            <td><div>${cfgRange}</div><div class="muted">已抓取（none）：${dataRange}</div></td>
            <td class="${statusClass(st)}">${st || "-"} <span class="muted">${msg ? "· " + msg : ""}</span></td>
            <td>
              <div class="actions">
                <button data-act="edit" data-code="${it.code}">编辑</button>
                <button data-act="fetch" data-code="${it.code}">抓取</button>
                <button data-act="del" data-code="${it.code}">删除</button>
              </div>
            </td>
          `;
          tr.dataset.item = JSON.stringify(it);
          tbody.appendChild(tr);
        }
        syncBulkActionButtons();
      }

      $("save").addEventListener("click", async () => {
        setMsg("");
        const payload = {
          code: $("code").value.trim(),
          name: $("name").value.trim(),
          start_date: $("start").value.trim() || null,
          end_date: $("end").value.trim() || null,
        };
        const resp = await api("/futures", { method: "POST", body: JSON.stringify(payload) });
        const text = await resp.text();
        if (!resp.ok) return setMsg(text);
        $("code").value = ""; $("name").value = ""; $("start").value = ""; $("end").value = "";
        await refresh();
      });

      $("fetchAll").addEventListener("click", async () => {
        setMsg("futures fetch-all...");
        const resp = await api("/futures/fetch-all", { method: "POST", body: "{}" });
        const text = await resp.text();
        if (!resp.ok) return setMsg(text);
        setMsg(text);
        await refresh();
      });

      $("selectAll").addEventListener("click", async () => {
        const resp = await api(`/futures?adjust=none`, { method: "GET" });
        const data = await resp.json();
        for (const it of data) selected.add(it.code);
        await refresh();
        syncBulkActionButtons();
      });
      $("selectNone").addEventListener("click", async () => {
        selected.clear();
        await refresh();
        syncBulkActionButtons();
      });
      $("selectInvert").addEventListener("click", async () => {
        const resp = await api(`/futures?adjust=none`, { method: "GET" });
        const data = await resp.json();
        const next = new Set();
        for (const it of data) if (!selected.has(it.code)) next.add(it.code);
        selected.clear();
        for (const x of next) selected.add(x);
        await refresh();
        syncBulkActionButtons();
      });

      $("fetchSelected").addEventListener("click", async () => {
        const codes = Array.from(selected);
        if (codes.length === 0) return setMsg("未选择任何期货标的。");
        setMsg(`futures fetch-selected: ${codes.join(", ")} ...`);
        const resp = await api("/futures/fetch-selected", { method: "POST", body: JSON.stringify({ codes }) });
        const text = await resp.text();
        if (!resp.ok) return setMsg(text);
        setMsg(text);
        await refresh();
      });

      $("deleteSelected").addEventListener("click", async () => {
        const codes = Array.from(selected);
        if (codes.length === 0) return setMsg("未选择任何期货标的。");
        if (!confirm(`确认删除所选 ${codes.length} 个期货标的池记录？\n${codes.join(", ")}`)) return;
        setMsg(`正在删除所选 ${codes.length} 个标的...`);
        const failed = [];
        for (const code of codes) {
          try {
            const resp = await api(`/futures/${code}`, { method: "DELETE" });
            if (!resp.ok) {
              const text = await resp.text();
              failed.push(`${code}: ${text}`);
              continue;
            }
            selected.delete(code);
          } catch (err) {
            failed.push(`${code}: ${String(err)}`);
          }
        }
        await refresh();
        if (failed.length > 0) {
          setMsg(`部分删除失败（${failed.length}/${codes.length}）：${failed.join(" | ")}`);
        } else {
          setMsg(`删除成功：共 ${codes.length} 个标的。`);
        }
      });

      $("tbody").addEventListener("click", async (e) => {
        const btn = e.target.closest("button");
        const cb = e.target.closest('input[type="checkbox"][data-act="sel"]');
        if (cb) {
          const code = cb.getAttribute("data-code");
          if (cb.checked) selected.add(code);
          else selected.delete(code);
          syncBulkActionButtons();
          return;
        }
        if (!btn) return;
        const act = btn.getAttribute("data-act");
        const code = btn.getAttribute("data-code");
        const tr = btn.closest("tr");
        const it = tr && tr.dataset.item ? JSON.parse(tr.dataset.item) : null;
        if (act === "del") {
          if (!confirm(`删除期货标的 ${code}？\n\n注意：会同时删除期货标的池记录与期货价格表数据（none）。`)) return;
          const resp = await api(`/futures/${code}`, { method: "DELETE" });
          const text = await resp.text();
          if (!resp.ok) return setMsg(text);
          setMsg(text);
          await refresh();
          syncBulkActionButtons();
        }
        if (act === "edit" && it) {
          $("code").value = it.code;
          $("name").value = it.name;
          $("start").value = it.start_date || "";
          $("end").value = it.end_date || "";
          setMsg("已载入到表单，修改后点“保存/更新”。");
        }
        if (act === "fetch") {
          setMsg(`futures fetch ${code}...`);
          const resp = await api(`/futures/${code}/fetch`, { method: "POST", body: "{}" });
          const text = await resp.text();
          if (!resp.ok) return setMsg(text);
          setMsg(text);
          await refresh();
        }
      });

      syncBulkActionButtons();
      refresh().catch((e) => setMsg(String(e)));
    </script>
  </body>
</html>
