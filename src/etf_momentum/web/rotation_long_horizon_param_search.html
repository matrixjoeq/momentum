<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>长周期轮动参数搜索（TopK x 月度调仓日）</title>
    <link rel="stylesheet" href="/static/terminal.css" />
    <script
      defer
      src="https://cdn.plot.ly/plotly-cartesian-2.30.0.min.js"
    ></script>
    <style>
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 960px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      .mono {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      .chart-box {
        width: 100%;
        height: 520px;
      }
      .table-wrap {
        overflow: auto;
      }
      td,
      th {
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h2>长周期轮动策略参数搜索</h2>
    <div class="muted">
      固定其余参数，仅扫描 `top_k=1..20` 与 `monthly rebalance_anchor=1..28`
      （共560组），同时展示 Sharpe 热力图与风险-收益有效前沿。
    </div>
    <div class="muted" style="margin-top: 6px">
      <a href="/research">返回研究主页</a>
    </div>

    <div class="panel no-print" style="margin-top: 12px">
      <div class="row">
        <div style="min-width: 620px; flex: 1">
          <label>结果 JSON URL</label>
          <input
            id="dataUrl"
            value="/static/data/rotation_long_horizon_param_search_results.json"
          />
        </div>
        <div style="display: flex; align-items: flex-end; gap: 8px">
          <button id="loadUrlBtn">加载 URL</button>
        </div>
        <div style="min-width: 320px">
          <label>或上传本地 JSON 文件</label>
          <input id="fileInput" type="file" accept=".json,application/json" />
        </div>
      </div>
    </div>

    <div class="panel no-print">
      <div class="row">
        <div>
          <label>明细表 TopN（按 Sharpe）</label>
          <input id="topN" value="80" />
        </div>
        <div>
          <label>前沿拟合阶数</label>
          <input id="fitDegree" value="2" />
        </div>
        <div style="display: flex; align-items: flex-end">
          <button id="refreshBtn">刷新图表与表格</button>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3 style="margin-top: 0">运行信息</h3>
        <div id="metaInfo" class="mono"></div>
      </div>
      <div class="panel">
        <h3 style="margin-top: 0">最佳参数（Sharpe）</h3>
        <div id="bestInfo" class="mono"></div>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">Sharpe 热力图（TopK x 月度调仓日）</h3>
      <div id="heatmapChart" class="chart-box"></div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">风险-收益有效前沿（全参数点）</h3>
      <div id="frontierChart" class="chart-box"></div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">网格结果明细</h3>
      <div class="table-wrap">
        <table id="resultTable"></table>
      </div>
    </div>

    <div id="status" class="muted" style="margin-top: 8px"></div>

    <script>
      const $ = (id) => document.getElementById(id);

      function status(msg) {
        $("status").textContent = msg || "";
      }

      function fmtNum(v, digits = 6) {
        const x = Number(v);
        return Number.isFinite(x) ? x.toFixed(digits) : "-";
      }

      function fmtPct(v, digits = 2) {
        const x = Number(v);
        return Number.isFinite(x) ? `${(x * 100).toFixed(digits)}%` : "-";
      }

      function parsePositive(v, fallback) {
        const x = Number(v);
        return Number.isFinite(x) && x > 0 ? x : fallback;
      }

      function metric(row, key) {
        const v = Number(row?.metrics?.[key]);
        return Number.isFinite(v) ? v : null;
      }

      function normalizeData(raw) {
        const meta = raw && typeof raw === "object" ? raw.meta || {} : {};
        const results =
          raw && typeof raw === "object" && Array.isArray(raw.results)
            ? raw.results
            : [];
        const best =
          raw && typeof raw === "object" && raw.best_single_setting
            ? raw.best_single_setting
            : null;
        return { meta, results, best };
      }

      function toSortedRows(rows) {
        const out = rows
          .filter(
            (x) =>
              Number.isFinite(Number(x?.top_k)) &&
              Number.isFinite(Number(x?.rebalance_anchor)),
          )
          .slice();
        out.sort(
          (a, b) =>
            Number(a.top_k) - Number(b.top_k) ||
            Number(a.rebalance_anchor) - Number(b.rebalance_anchor),
        );
        return out;
      }

      function pickBestBySharpe(rows) {
        let best = null;
        let bestKey = null;
        rows.forEach((r) => {
          if (String(r?.status || "") !== "ok") return;
          const sharpe = metric(r, "sharpe_ratio");
          if (sharpe == null) return;
          const ann = metric(r, "annualized_return");
          const cum = metric(r, "cumulative_return");
          const mdd = metric(r, "max_drawdown");
          const key = [
            sharpe,
            ann == null ? -1e18 : ann,
            cum == null ? -1e18 : cum,
            mdd == null ? -1e18 : -Math.abs(mdd),
          ];
          if (!bestKey || key.join("|") > bestKey.join("|")) {
            bestKey = key;
            best = r;
          }
        });
        return best;
      }

      function uniqueSorted(rows, key) {
        const s = new Set();
        rows.forEach((r) => {
          const v = Number(r?.[key]);
          if (Number.isFinite(v)) s.add(v);
        });
        return Array.from(s).sort((a, b) => a - b);
      }

      function renderMeta(meta, rows) {
        const lines = [];
        lines.push(`生成时间: ${String(meta.generated_at || "-")}`);
        lines.push(`后端地址: ${String(meta.api_base_url || "-")}`);
        lines.push(`接口: ${String(meta.api_endpoint || "-")}`);
        lines.push(
          `样本总数: ${Number(meta.total_cases || rows.length || 0)} (成功 ${Number(meta.success_cases || 0)}, 失败 ${Number(meta.error_cases || 0)})`,
        );
        const ss = meta.search_space || {};
        lines.push(
          `top_k: ${ss.top_k_start}..${ss.top_k_end} (step ${ss.top_k_step})`,
        );
        lines.push(
          `anchor: ${ss.anchor_start}..${ss.anchor_end} (step ${ss.anchor_step})`,
        );
        const ctx = meta.search_context || {};
        lines.push(`组合分组: ${String(ctx.group_name || "-")}`);
        lines.push(
          `回测区间: ${String((ctx.backtest_range || {}).start || "-")}..${String((ctx.backtest_range || {}).end || "-")}`,
        );
        lines.push(
          `标的数: ${Array.isArray(ctx.selected_codes) ? ctx.selected_codes.length : "-"}`,
        );
        $("metaInfo").innerHTML = lines.map((x) => `<div>${x}</div>`).join("");
      }

      function renderBest(bestFromFile, bestFromRows) {
        const best = bestFromRows || bestFromFile || null;
        if (!best) {
          $("bestInfo").innerHTML = "<div>无可用结果</div>";
          return;
        }
        const lines = [];
        lines.push(`Top K: ${Number(best.top_k)}`);
        lines.push(`月度调仓日(anchor): ${Number(best.rebalance_anchor)}`);
        lines.push(`Sharpe: ${fmtNum(metric(best, "sharpe_ratio"), 6)}`);
        lines.push(`年化收益: ${fmtPct(metric(best, "annualized_return"), 2)}`);
        lines.push(
          `年化波动: ${fmtPct(metric(best, "annualized_volatility"), 2)}`,
        );
        lines.push(`累计收益: ${fmtPct(metric(best, "cumulative_return"), 2)}`);
        lines.push(`最大回撤: ${fmtPct(metric(best, "max_drawdown"), 2)}`);
        $("bestInfo").innerHTML = lines.map((x) => `<div>${x}</div>`).join("");
      }

      function buildHeatmapMatrix(rows) {
        const topKVals = uniqueSorted(rows, "top_k");
        const anchorVals = uniqueSorted(rows, "rebalance_anchor");
        const z = [];
        const text = [];
        const rowMap = new Map();
        rows.forEach((r) => {
          rowMap.set(`${Number(r.top_k)}|${Number(r.rebalance_anchor)}`, r);
        });
        anchorVals.forEach((anchor) => {
          const zRow = [];
          const textRow = [];
          topKVals.forEach((tk) => {
            const one = rowMap.get(`${tk}|${anchor}`);
            const sharpe = one ? metric(one, "sharpe_ratio") : null;
            const ann = one ? metric(one, "annualized_return") : null;
            const vol = one ? metric(one, "annualized_volatility") : null;
            const mdd = one ? metric(one, "max_drawdown") : null;
            zRow.push(sharpe == null ? null : sharpe);
            textRow.push(
              one
                ? `TopK=${tk}<br>Anchor=${anchor}<br>Sharpe=${fmtNum(sharpe, 4)}<br>AnnRet=${fmtPct(ann, 2)}<br>AnnVol=${fmtPct(vol, 2)}<br>MDD=${fmtPct(mdd, 2)}`
                : `TopK=${tk}<br>Anchor=${anchor}<br>无数据`,
            );
          });
          z.push(zRow);
          text.push(textRow);
        });
        return { topKVals, anchorVals, z, text };
      }

      function renderHeatmap(rows, best) {
        const hm = buildHeatmapMatrix(rows);
        const traces = [
          {
            type: "heatmap",
            x: hm.topKVals,
            y: hm.anchorVals,
            z: hm.z,
            text: hm.text,
            hovertemplate: "%{text}<extra></extra>",
            colorscale: "RdYlGn",
            reversescale: false,
            colorbar: { title: "Sharpe" },
          },
        ];
        if (best) {
          traces.push({
            type: "scatter",
            mode: "markers",
            x: [Number(best.top_k)],
            y: [Number(best.rebalance_anchor)],
            marker: {
              size: 14,
              symbol: "star",
              color: "#9467bd",
              line: { width: 1, color: "#222" },
            },
            name: "Sharpe最优",
            hovertemplate:
              "Sharpe最优<br>TopK=%{x}<br>Anchor=%{y}<extra></extra>",
          });
        }
        Plotly.newPlot(
          "heatmapChart",
          traces,
          {
            margin: { t: 30, r: 20, b: 60, l: 70 },
            xaxis: { title: "Top K" },
            yaxis: { title: "月度调仓日 (anchor)" },
            legend: { orientation: "h" },
          },
          { responsive: true },
        );
      }

      function computeFrontierPoints(points) {
        const sorted = points.slice().sort((a, b) => {
          if (Math.abs(a.risk - b.risk) < 1e-12) return b.ret - a.ret;
          return a.risk - b.risk;
        });
        const frontier = [];
        let bestRet = -Infinity;
        sorted.forEach((p) => {
          if (p.ret > bestRet + 1e-12) {
            frontier.push(p);
            bestRet = p.ret;
          }
        });
        return frontier;
      }

      function solveLinearSystem(a, b) {
        const n = a.length;
        const m = a.map((row, i) => row.slice().concat([b[i]]));
        for (let col = 0; col < n; col++) {
          let pivot = col;
          let pivAbs = Math.abs(m[col][col] || 0);
          for (let r = col + 1; r < n; r++) {
            const v = Math.abs(m[r][col] || 0);
            if (v > pivAbs) {
              pivot = r;
              pivAbs = v;
            }
          }
          if (pivAbs < 1e-12) return null;
          if (pivot !== col) {
            const tmp = m[col];
            m[col] = m[pivot];
            m[pivot] = tmp;
          }
          const base = m[col][col];
          for (let c = col; c <= n; c++) m[col][c] /= base;
          for (let r = 0; r < n; r++) {
            if (r === col) continue;
            const factor = m[r][col];
            if (Math.abs(factor) < 1e-12) continue;
            for (let c = col; c <= n; c++) m[r][c] -= factor * m[col][c];
          }
        }
        return m.map((row) => row[n]);
      }

      function fitPolynomial(xs, ys, degree) {
        const n = xs.length;
        const d = Math.min(Math.max(1, degree), n - 1);
        const m = d + 1;
        const a = Array.from({ length: m }, () => Array(m).fill(0));
        const b = Array(m).fill(0);
        for (let row = 0; row < m; row++) {
          for (let col = 0; col < m; col++) {
            let s = 0;
            for (let i = 0; i < n; i++) s += xs[i] ** (row + col);
            a[row][col] = s;
          }
          let sb = 0;
          for (let i = 0; i < n; i++) sb += ys[i] * xs[i] ** row;
          b[row] = sb;
        }
        return solveLinearSystem(a, b);
      }

      function evalPolynomial(coeffs, x) {
        if (!Array.isArray(coeffs)) return null;
        let y = 0;
        for (let i = 0; i < coeffs.length; i++) y += coeffs[i] * x ** i;
        return y;
      }

      function renderFrontier(rows, best) {
        const points = rows
          .filter((r) => String(r?.status || "") === "ok")
          .map((r) => {
            const risk = metric(r, "annualized_volatility");
            const ret = metric(r, "annualized_return");
            const sharpe = metric(r, "sharpe_ratio");
            if (
              risk == null ||
              ret == null ||
              !Number.isFinite(risk) ||
              !Number.isFinite(ret)
            ) {
              return null;
            }
            return {
              top_k: Number(r.top_k),
              anchor: Number(r.rebalance_anchor),
              risk,
              ret,
              sharpe,
              mdd: metric(r, "max_drawdown"),
            };
          })
          .filter(Boolean);

        if (points.length === 0) {
          Plotly.newPlot(
            "frontierChart",
            [],
            {
              margin: { t: 30, r: 20, b: 60, l: 70 },
              xaxis: { title: "年化波动率（风险）", tickformat: ".2%" },
              yaxis: { title: "年化收益率", tickformat: ".2%" },
              annotations: [
                {
                  text: "无可绘制数据",
                  x: 0.5,
                  y: 0.5,
                  xref: "paper",
                  yref: "paper",
                  showarrow: false,
                },
              ],
            },
            { responsive: true },
          );
          return;
        }

        const frontier = computeFrontierPoints(points);
        const fx = frontier.map((p) => p.risk);
        const fy = frontier.map((p) => p.ret);
        const degree = Math.floor(parsePositive($("fitDegree").value, 2));
        const coeffs =
          frontier.length >= 2 ? fitPolynomial(fx, fy, degree) : null;
        const fitX = [];
        const fitY = [];
        if (coeffs && frontier.length >= 2) {
          const minX = Math.min(...fx);
          const maxX = Math.max(...fx);
          const n = 150;
          for (let i = 0; i < n; i++) {
            const x = minX + ((maxX - minX) * i) / (n - 1);
            const y = evalPolynomial(coeffs, x);
            if (Number.isFinite(y)) {
              fitX.push(x);
              fitY.push(y);
            }
          }
        }

        const traces = [
          {
            type: "scatter",
            mode: "markers",
            x: points.map((p) => p.risk),
            y: points.map((p) => p.ret),
            name: "参数点",
            marker: {
              size: 9,
              color: points.map((p) => p.sharpe),
              colorscale: "Viridis",
              colorbar: { title: "Sharpe" },
              line: { width: 0.5, color: "#1b2a3a" },
            },
            customdata: points.map((p) => [p.top_k, p.anchor, p.sharpe, p.mdd]),
            hovertemplate:
              "TopK=%{customdata[0]}<br>Anchor=%{customdata[1]}<br>风险=%{x:.2%}<br>年化收益=%{y:.2%}<br>Sharpe=%{customdata[2]:.4f}<br>最大回撤=%{customdata[3]:.2%}<extra></extra>",
          },
          {
            type: "scatter",
            mode: "lines+markers",
            x: fx,
            y: fy,
            name: "有效前沿（离散）",
            marker: { size: 7, color: "#ff7f0e" },
            line: { width: 2, color: "#ff7f0e" },
            hovertemplate:
              "有效前沿点<br>风险=%{x:.2%}<br>年化收益=%{y:.2%}<extra></extra>",
          },
        ];
        if (fitX.length > 0) {
          traces.push({
            type: "scatter",
            mode: "lines",
            x: fitX,
            y: fitY,
            name: "前沿拟合曲线",
            line: { width: 3, color: "#d62728", dash: "dash" },
            hovertemplate:
              "拟合前沿<br>风险=%{x:.2%}<br>拟合年化收益=%{y:.2%}<extra></extra>",
          });
        }
        if (best) {
          const br = metric(best, "annualized_volatility");
          const bt = metric(best, "annualized_return");
          if (br != null && bt != null) {
            traces.push({
              type: "scatter",
              mode: "markers",
              x: [br],
              y: [bt],
              name: "Sharpe最优",
              marker: { size: 13, symbol: "star", color: "#9467bd" },
              hovertemplate:
                "Sharpe最优<br>风险=%{x:.2%}<br>年化收益=%{y:.2%}<extra></extra>",
            });
          }
        }

        Plotly.newPlot(
          "frontierChart",
          traces,
          {
            margin: { t: 30, r: 70, b: 60, l: 70 },
            xaxis: { title: "年化波动率（风险）", tickformat: ".2%" },
            yaxis: { title: "年化收益率", tickformat: ".2%" },
            legend: { orientation: "h" },
          },
          { responsive: true },
        );
      }

      function renderTable(rows) {
        const topN = Math.max(
          1,
          Math.floor(parsePositive($("topN").value, 80)),
        );
        const sorted = rows.slice().sort((a, b) => {
          const av = metric(a, "sharpe_ratio");
          const bv = metric(b, "sharpe_ratio");
          if (av == null && bv == null) return 0;
          if (av == null) return 1;
          if (bv == null) return -1;
          return bv - av;
        });
        const head =
          "<tr>" +
          [
            "Top K",
            "月度调仓日",
            "Sharpe",
            "年化收益",
            "年化波动",
            "累计收益",
            "最大回撤",
            "状态",
            "错误",
          ]
            .map((x) => `<th>${x}</th>`)
            .join("") +
          "</tr>";
        const body = sorted
          .slice(0, topN)
          .map((r) => {
            return `<tr>
              <td>${Number(r.top_k)}</td>
              <td>${Number(r.rebalance_anchor)}</td>
              <td>${fmtNum(metric(r, "sharpe_ratio"), 6)}</td>
              <td>${fmtPct(metric(r, "annualized_return"), 2)}</td>
              <td>${fmtPct(metric(r, "annualized_volatility"), 2)}</td>
              <td>${fmtPct(metric(r, "cumulative_return"), 2)}</td>
              <td>${fmtPct(metric(r, "max_drawdown"), 2)}</td>
              <td>${String(r.status || "-")}</td>
              <td>${String(r.error || "").slice(0, 120)}</td>
            </tr>`;
          })
          .join("");
        $("resultTable").innerHTML =
          head + (body || `<tr><td colspan="9">暂无数据</td></tr>`);
      }

      function refreshView() {
        const state = window.__rotLongHorizonState;
        if (!state) return;
        const rows = toSortedRows(state.results);
        const best = pickBestBySharpe(rows);
        renderMeta(state.meta, rows);
        renderBest(state.best, best);
        renderHeatmap(rows, best);
        renderFrontier(rows, best);
        renderTable(rows);
      }

      async function loadFromUrl(url) {
        status("正在加载数据...");
        const resp = await fetch(url, { cache: "no-store" });
        if (!resp.ok) throw new Error(`加载失败: HTTP ${resp.status}`);
        const data = await resp.json();
        const norm = normalizeData(data);
        if (!Array.isArray(norm.results) || norm.results.length === 0) {
          throw new Error("结果为空");
        }
        window.__rotLongHorizonState = norm;
        refreshView();
        status(`加载完成: ${url}`);
      }

      function bindEvents() {
        $("loadUrlBtn").addEventListener("click", async () => {
          try {
            const url = String($("dataUrl").value || "").trim();
            if (!url) throw new Error("请输入 JSON URL");
            await loadFromUrl(url);
          } catch (e) {
            status(String(e));
          }
        });
        $("fileInput").addEventListener("change", async (ev) => {
          try {
            const files = ev?.target?.files;
            if (!files || files.length === 0) return;
            const txt = await files[0].text();
            const data = JSON.parse(txt);
            const norm = normalizeData(data);
            if (!Array.isArray(norm.results) || norm.results.length === 0) {
              throw new Error("结果为空");
            }
            window.__rotLongHorizonState = norm;
            refreshView();
            status(`已加载本地文件: ${files[0].name}`);
          } catch (e) {
            status(`读取本地文件失败: ${String(e)}`);
          }
        });
        $("refreshBtn").addEventListener("click", () => {
          try {
            refreshView();
            status("已刷新");
          } catch (e) {
            status(String(e));
          }
        });
        $("topN").addEventListener("change", refreshView);
        $("fitDegree").addEventListener("change", refreshView);
      }

      function init() {
        bindEvents();
        loadFromUrl(String($("dataUrl").value || "")).catch((e) => {
          status(`自动加载失败: ${String(e)}`);
        });
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
