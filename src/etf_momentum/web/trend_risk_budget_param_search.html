<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>趋势风险预算参数搜索</title>
    <link rel="stylesheet" href="/static/terminal.css" />
    <script
      defer
      src="https://cdn.plot.ly/plotly-cartesian-2.30.0.min.js"
    ></script>
    <style>
      #sharpeLine {
        width: 100%;
        height: 520px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 960px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      td,
      th {
        white-space: nowrap;
      }
      .mono {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      .robust-row {
        background: color-mix(in srgb, var(--ok, #1e7f4f) 12%, transparent);
      }
    </style>
  </head>
  <body>
    <h2>趋势风险预算参数搜索</h2>
    <div class="muted">
      展示 `trend_risk_budget_param_search.py`
      的网格搜索结果，并给出综合评分最高的最佳单一参数设置。
    </div>
    <div class="muted" style="margin-top: 6px">
      <a href="/research">返回研究主页</a>
    </div>

    <div class="panel no-print" style="margin-top: 12px">
      <div class="row">
        <div style="min-width: 520px; flex: 1">
          <label>结果 JSON URL</label>
          <input
            id="dataUrl"
            value="/static/data/trend_risk_budget_param_search_results.json"
          />
        </div>
        <div style="display: flex; align-items: flex-end; gap: 8px">
          <button id="loadUrlBtn">加载 URL</button>
        </div>
        <div style="min-width: 320px">
          <label>或上传本地 JSON 文件</label>
          <input id="fileInput" type="file" accept=".json,application/json" />
        </div>
      </div>
    </div>

    <div class="panel no-print">
      <div class="row">
        <div>
          <label>TopN</label>
          <input id="topN" value="30" />
        </div>
        <div>
          <label>稳健候选（综合评分前N）</label>
          <input id="robustTopK" value="3" />
        </div>
        <div>
          <label>最大回撤阈值(%)</label>
          <input id="robustMddLimitPct" value="20" />
        </div>
        <div style="display: flex; align-items: flex-end">
          <button id="refreshBtn">刷新图表与表格</button>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3 style="margin-top: 0">运行信息</h3>
        <div id="metaInfo" class="mono"></div>
      </div>
      <div class="panel">
        <h3 style="margin-top: 0">最佳单一设置（综合评分最高）</h3>
        <div id="bestInfo" class="mono"></div>
      </div>
    </div>
    <div class="panel">
      <h3 style="margin-top: 0">推荐稳健区间（自动标注）</h3>
      <div id="robustInfo" class="mono"></div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">风险预算有效前沿（风险-收益 + 曲线拟合）</h3>
      <div id="sharpeLine"></div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">网格结果明细</h3>
      <div style="overflow: auto">
        <table id="resultTable"></table>
      </div>
    </div>

    <div id="status" class="muted" style="margin-top: 8px"></div>

    <script>
      const $ = (id) => document.getElementById(id);

      function status(msg) {
        $("status").textContent = msg || "";
      }

      function fmtNum(v, digits = 6) {
        const x = Number(v);
        return Number.isFinite(x) ? x.toFixed(digits) : "-";
      }

      function fmtPct(v, digits = 2) {
        const x = Number(v);
        return Number.isFinite(x) ? `${(x * 100).toFixed(digits)}%` : "-";
      }

      function fmtPctInput(v, digits = 2) {
        const x = Number(v);
        return Number.isFinite(x) ? `${x.toFixed(digits)}%` : "-";
      }

      function normalizeData(raw) {
        const meta = raw && typeof raw === "object" ? raw.meta || {} : {};
        const results =
          raw && typeof raw === "object" && Array.isArray(raw.results)
            ? raw.results
            : [];
        const best =
          raw && typeof raw === "object" && raw.best_single_setting
            ? raw.best_single_setting
            : null;
        return { meta, results, best };
      }

      function toSortedRows(rows) {
        const out = rows
          .filter((x) => Number.isFinite(Number(x?.risk_budget_pct_percent)))
          .slice();
        out.sort(
          (a, b) =>
            Number(a.risk_budget_pct_percent) -
            Number(b.risk_budget_pct_percent),
        );
        return out;
      }

      function metric(row, key) {
        const v = Number(row?.metrics?.[key]);
        return Number.isFinite(v) ? v : null;
      }

      const OBJECTIVE_COMPONENTS = [
        { key: "sharpe_ratio", label: "夏普", higherBetter: true },
        { key: "calmar_ratio", label: "卡玛", higherBetter: true },
        { key: "sortino_ratio", label: "索提诺", higherBetter: true },
        { key: "ulcer_index", label: "溃疡指标", higherBetter: false },
        {
          key: "ulcer_performance_index",
          label: "溃疡绩效",
          higherBetter: true,
        },
        { key: "sqn_recent_100", label: "近100笔SQN", higherBetter: true },
      ];
      const OBJECTIVE_GROUPS = [
        {
          key: "risk_adjusted_return",
          label: "收益效率组",
          weight: 0.45,
          metrics: [
            "sharpe_ratio",
            "calmar_ratio",
            "sortino_ratio",
            "ulcer_performance_index",
          ],
        },
        {
          key: "pain_control",
          label: "持有痛苦组",
          weight: 0.25,
          metrics: ["ulcer_index"],
        },
        {
          key: "system_quality",
          label: "系统质量组",
          weight: 0.3,
          metrics: ["sqn_recent_100"],
        },
      ];

      function objectiveScore(row) {
        const v = Number(row?.__compositeScore ?? row?.composite_score);
        return Number.isFinite(v) ? v : null;
      }

      function objectiveEligible(row) {
        if (typeof row?.__objectiveEligible === "boolean")
          return row.__objectiveEligible;
        return Boolean(row?.objective_eligible);
      }

      function computeCompositeScores(rows) {
        const eligibleRows = [];
        rows.forEach((r) => {
          r.__compositeScore = null;
          r.__compositeComponents = {};
          r.__compositeGroupScores = {};
          r.__objectiveEligible = false;
          r.__objectiveMissingMetrics = [];
          r.__objectiveReason = null;
          if (String(r?.status || "") !== "ok") return;
          const sqnMin = Number(r?.metrics?.sqn_min_trades ?? 30);
          const sqnTradeCountTotal = Number(r?.metrics?.sqn_trade_count_total);
          if (
            Number.isFinite(sqnTradeCountTotal) &&
            Number.isFinite(sqnMin) &&
            sqnTradeCountTotal < sqnMin
          ) {
            const sqnReason = r?.metrics?.sqn_reason;
            r.__objectiveReason =
              `sqn_trade_count_lt_min:${sqnTradeCountTotal}<${sqnMin}` +
              (sqnReason ? ` (sqn_reason=${sqnReason})` : "");
            return;
          }
          const missing = OBJECTIVE_COMPONENTS.map((c) => c.key).filter(
            (k) => metric(r, k) == null,
          );
          if (missing.length > 0) {
            const sqnReason = r?.metrics?.sqn_reason;
            r.__objectiveMissingMetrics = missing;
            r.__objectiveReason =
              "missing_metrics:" +
              missing.join(",") +
              (missing.includes("sqn_recent_100") && sqnReason
                ? ` (sqn_reason=${sqnReason})`
                : "");
            return;
          }
          r.__objectiveEligible = true;
          eligibleRows.push(r);
        });

        const bounds = {};
        OBJECTIVE_COMPONENTS.forEach((c) => {
          const vals = eligibleRows
            .map((r) => metric(r, c.key))
            .filter((v) => Number.isFinite(v));
          if (vals.length > 0) {
            bounds[c.key] = { min: Math.min(...vals), max: Math.max(...vals) };
          }
        });

        eligibleRows.forEach((r) => {
          const comps = {};
          OBJECTIVE_COMPONENTS.forEach((c) => {
            const v = metric(r, c.key);
            const b = bounds[c.key];
            if (v == null || !b) return;
            const range = b.max - b.min;
            let s = 0.5;
            if (Math.abs(range) > 1e-12) {
              const base = (v - b.min) / range;
              s = c.higherBetter ? base : 1 - base;
            }
            comps[c.key] = Math.max(0, Math.min(1, s));
          });
          let weightedSum = 0;
          let weightSum = 0;
          const groupScores = {};
          OBJECTIVE_GROUPS.forEach((g) => {
            const vals = g.metrics
              .map((m) => comps[m])
              .filter((v) => Number.isFinite(v));
            const hasBounds = g.metrics.some((m) =>
              Object.prototype.hasOwnProperty.call(bounds, m),
            );
            let groupScore = null;
            if (vals.length > 0) {
              groupScore = vals.reduce((a, b) => a + b, 0) / vals.length;
            } else if (hasBounds) {
              groupScore = 0;
            } else {
              return;
            }
            groupScores[g.key] = groupScore;
            weightedSum += groupScore * Number(g.weight || 0);
            weightSum += Number(g.weight || 0);
          });
          if (weightSum > 0) {
            r.__compositeScore = weightedSum / weightSum;
          }
          r.__compositeComponents = comps;
          r.__compositeGroupScores = groupScores;
          if (r.__compositeScore == null) {
            r.__objectiveEligible = false;
            r.__objectiveReason = "composite_score_unavailable";
          }
          r.composite_score = r.__compositeScore;
        });
        return { bounds, method: "grouped_minmax_weighted" };
      }

      function pickBestFromRows(rows) {
        let best = null;
        let bestKey = null;
        rows.forEach((r) => {
          if (String(r?.status || "") !== "ok") return;
          if (!objectiveEligible(r)) return;
          const comp = objectiveScore(r);
          if (comp == null) return;
          const sharpe = metric(r, "sharpe_ratio");
          if (sharpe == null) return;
          const ann = metric(r, "annualized_return");
          const cum = metric(r, "cumulative_return");
          const mdd = metric(r, "max_drawdown");
          const k = [
            comp,
            sharpe,
            ann == null ? -1e18 : ann,
            cum == null ? -1e18 : cum,
            mdd == null ? -1e18 : -Math.abs(mdd),
          ];
          if (!bestKey || k.join("|") > bestKey.join("|")) {
            bestKey = k;
            best = r;
          }
        });
        return best;
      }

      function parsePositive(value, fallback) {
        const v = Number(value);
        return Number.isFinite(v) && v > 0 ? v : fallback;
      }

      function getRobustConfig() {
        const topK = Math.max(
          1,
          Math.floor(parsePositive($("robustTopK").value, 3)),
        );
        const mddLimitPct = parsePositive($("robustMddLimitPct").value, 20);
        return { topK, mddLimitPct };
      }

      function pickRobustCandidates(rows, topK, mddLimitPct) {
        const okRows = rows.filter(
          (r) => String(r?.status || "") === "ok" && objectiveEligible(r),
        );
        const sortedByComposite = okRows.slice().sort((a, b) => {
          const av = objectiveScore(a);
          const bv = objectiveScore(b);
          if (av == null && bv == null) return 0;
          if (av == null) return 1;
          if (bv == null) return -1;
          return bv - av;
        });
        const topRows = sortedByComposite.slice(0, Math.max(1, topK));
        const mddLimit = Math.abs(Number(mddLimitPct)) / 100.0;
        const robustRows = topRows.filter((r) => {
          const mdd = metric(r, "max_drawdown");
          return mdd != null && Math.abs(mdd) <= mddLimit;
        });
        if (robustRows.length === 0) {
          return {
            topRows,
            robustRows,
            interval: null,
            robustKeySet: new Set(),
          };
        }
        const xs = robustRows.map((r) => Number(r.risk_budget_pct_percent));
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const robustKeySet = new Set(xs.map((x) => x.toFixed(6)));
        return {
          topRows,
          robustRows,
          interval: { minX, maxX },
          robustKeySet,
        };
      }

      function renderMeta(meta, rows) {
        const lines = [];
        lines.push(`生成时间: ${String(meta.generated_at || "-")}`);
        lines.push(`后端地址: ${String(meta.api_base_url || "-")}`);
        lines.push(`接口: ${String(meta.api_endpoint || "-")}`);
        lines.push(
          `样本总数: ${Number(meta.total_cases || rows.length || 0)} (成功 ${Number(meta.success_cases || 0)}, 失败 ${Number(meta.error_cases || 0)})`,
        );
        const ss = meta.search_space || {};
        lines.push(
          `遍历区间: [${ss.risk_budget_pct_percent_start}, ${ss.risk_budget_pct_percent_end}]，步长 ${ss.risk_budget_pct_percent_step}`,
        );
        const ctx = meta.search_context || {};
        lines.push(`标的池: ${(ctx.selected_codes || []).join(", ")}`);
        lines.push(`策略: tsmom, 执行价: close, 引擎: legacy`);
        const ineligibleRows = rows.filter(
          (r) => String(r?.status || "") === "ok" && !objectiveEligible(r),
        );
        const sqnLt100Rows = rows.filter((r) => {
          if (String(r?.status || "") !== "ok") return false;
          const n = metric(r, "sqn_trade_count_total");
          return n != null && n >= 30 && n < 100;
        });
        lines.push(
          `可比样本: ${rows.filter((r) => objectiveEligible(r)).length}，不可比样本: ${ineligibleRows.length}`,
        );
        lines.push(`近100笔SQN样本不足（30~99笔）: ${sqnLt100Rows.length}`);
        lines.push(
          "评价目标: 综合评分（分组加权Min-Max，系统质量使用近100笔SQN；总交易<30不参与排序）",
        );
        $("metaInfo").innerHTML = lines.map((x) => `<div>${x}</div>`).join("");
      }

      function renderBest(bestFromFile, bestFromRows) {
        const best = bestFromRows || bestFromFile || null;
        if (!best) {
          $("bestInfo").innerHTML = "<div>无可用结果</div>";
          return;
        }
        const lines = [];
        lines.push(
          `risk_budget_pct(输入百分比): ${fmtPctInput(best.risk_budget_pct_percent, 2)}`,
        );
        lines.push(
          `risk_budget_pct(后端小数): ${fmtNum(best.risk_budget_pct, 4)}`,
        );
        lines.push(`综合评分: ${fmtNum(objectiveScore(best), 6)}`);
        lines.push(`夏普: ${fmtNum(metric(best, "sharpe_ratio"), 6)}`);
        lines.push(`卡玛: ${fmtNum(metric(best, "calmar_ratio"), 6)}`);
        lines.push(`索提诺: ${fmtNum(metric(best, "sortino_ratio"), 6)}`);
        lines.push(`溃疡指标: ${fmtNum(metric(best, "ulcer_index"), 6)}`);
        lines.push(
          `溃疡绩效: ${fmtNum(metric(best, "ulcer_performance_index"), 6)}`,
        );
        lines.push(`近100笔SQN: ${fmtNum(metric(best, "sqn_recent_100"), 6)}`);
        const bestTradeCount = metric(best, "sqn_trade_count_total");
        if (bestTradeCount != null && bestTradeCount < 100) {
          lines.push(
            `近100样本状态: 不足100笔（当前 ${fmtNum(bestTradeCount, 0)}）`,
          );
        }
        lines.push(`年化收益: ${fmtPct(metric(best, "annualized_return"), 2)}`);
        lines.push(`累计收益: ${fmtPct(metric(best, "cumulative_return"), 2)}`);
        lines.push(`最大回撤: ${fmtPct(metric(best, "max_drawdown"), 2)}`);
        $("bestInfo").innerHTML = lines.map((x) => `<div>${x}</div>`).join("");
      }

      function renderRobustInfo(pack, cfg) {
        const lines = [];
        lines.push(
          `筛选规则: 综合评分前 ${cfg.topK} 名 且 最大回撤绝对值 ≤ ${fmtPct(cfg.mddLimitPct / 100.0, 2)}`,
        );
        lines.push(
          `候选数量: ${pack.robustRows.length} / Top${pack.topRows.length}`,
        );
        if (!pack.interval) {
          lines.push("推荐稳健区间: 无（当前阈值下未命中）");
          $("robustInfo").innerHTML = lines
            .map((x) => `<div>${x}</div>`)
            .join("");
          return;
        }
        const minPct = Number(pack.interval.minX);
        const maxPct = Number(pack.interval.maxX);
        const one = pack.robustRows[0];
        lines.push(
          `推荐稳健区间: [${fmtPctInput(minPct, 2)}, ${fmtPctInput(maxPct, 2)}]`,
        );
        lines.push(
          `区间内最高综合评分: ${fmtNum(objectiveScore(one), 6)} @ ${fmtPctInput(one.risk_budget_pct_percent, 2)}`,
        );
        $("robustInfo").innerHTML = lines
          .map((x) => `<div>${x}</div>`)
          .join("");
      }

      function getRiskMetricKey(rows) {
        const hasVol = rows.some(
          (r) => metric(r, "annualized_volatility") != null,
        );
        return hasVol ? "annualized_volatility" : "max_drawdown_abs";
      }

      function getRiskValue(row, riskKey) {
        if (riskKey === "annualized_volatility") {
          return metric(row, "annualized_volatility");
        }
        const mdd = metric(row, "max_drawdown");
        return mdd == null ? null : Math.abs(mdd);
      }

      function riskAxisTitle(riskKey) {
        if (riskKey === "annualized_volatility") return "年化波动率（风险）";
        return "最大回撤绝对值（风险代理）";
      }

      function solveLinearSystem(a, b) {
        const n = a.length;
        const mat = a.map((row, i) => row.slice().concat([b[i]]));
        for (let col = 0; col < n; col++) {
          let pivot = col;
          let pivotAbs = Math.abs(mat[col][col] || 0);
          for (let r = col + 1; r < n; r++) {
            const v = Math.abs(mat[r][col] || 0);
            if (v > pivotAbs) {
              pivot = r;
              pivotAbs = v;
            }
          }
          if (pivotAbs < 1e-12) return null;
          if (pivot !== col) {
            const tmp = mat[col];
            mat[col] = mat[pivot];
            mat[pivot] = tmp;
          }
          const base = mat[col][col];
          for (let c = col; c <= n; c++) mat[col][c] /= base;
          for (let r = 0; r < n; r++) {
            if (r === col) continue;
            const factor = mat[r][col];
            if (Math.abs(factor) < 1e-12) continue;
            for (let c = col; c <= n; c++) mat[r][c] -= factor * mat[col][c];
          }
        }
        return mat.map((row) => row[n]);
      }

      function fitPolynomial(xs, ys, degree) {
        const n = xs.length;
        const d = Math.min(Math.max(1, degree), n - 1);
        const m = d + 1;
        const a = Array.from({ length: m }, () => Array(m).fill(0));
        const b = Array(m).fill(0);
        for (let row = 0; row < m; row++) {
          for (let col = 0; col < m; col++) {
            let s = 0;
            for (let i = 0; i < n; i++) s += xs[i] ** (row + col);
            a[row][col] = s;
          }
          let sb = 0;
          for (let i = 0; i < n; i++) sb += ys[i] * xs[i] ** row;
          b[row] = sb;
        }
        return solveLinearSystem(a, b);
      }

      function evalPolynomial(coeffs, x) {
        if (!Array.isArray(coeffs)) return null;
        let y = 0;
        for (let i = 0; i < coeffs.length; i++) y += coeffs[i] * x ** i;
        return y;
      }

      function computeFrontierPoints(points) {
        const sorted = points.slice().sort((a, b) => {
          if (Math.abs(a.risk - b.risk) < 1e-12) return b.ret - a.ret;
          return a.risk - b.risk;
        });
        const frontier = [];
        let bestRet = -Infinity;
        sorted.forEach((p) => {
          if (p.ret > bestRet + 1e-12) {
            frontier.push(p);
            bestRet = p.ret;
          }
        });
        return frontier;
      }

      function renderLine(rows, best, robustPack) {
        const riskKey = getRiskMetricKey(rows);
        const points = rows
          .filter(
            (r) => String(r?.status || "") === "ok" && objectiveEligible(r),
          )
          .map((r) => {
            const risk = getRiskValue(r, riskKey);
            const ret = metric(r, "annualized_return");
            const budget = Number(r.risk_budget_pct_percent);
            const sharpe = metric(r, "sharpe_ratio");
            const mdd = metric(r, "max_drawdown");
            const sqnRecent100 = metric(r, "sqn_recent_100");
            const composite = objectiveScore(r);
            if (
              risk == null ||
              ret == null ||
              !Number.isFinite(budget) ||
              !Number.isFinite(risk) ||
              !Number.isFinite(ret)
            ) {
              return null;
            }
            return {
              row: r,
              risk,
              ret,
              budget,
              sharpe,
              mdd,
              sqnRecent100,
              composite,
            };
          })
          .filter(Boolean);
        if (points.length === 0) {
          Plotly.newPlot(
            "sharpeLine",
            [],
            {
              margin: { t: 30, r: 30, b: 50, l: 60 },
              xaxis: { title: riskAxisTitle(riskKey), tickformat: ".2%" },
              yaxis: { title: "年化收益", tickformat: ".2%" },
              annotations: [
                {
                  text: "无可绘制的有效前沿数据",
                  x: 0.5,
                  y: 0.5,
                  xref: "paper",
                  yref: "paper",
                  showarrow: false,
                  font: { size: 14 },
                },
              ],
            },
            { responsive: true },
          );
          return;
        }
        const frontier = computeFrontierPoints(points);
        const frontierXs = frontier.map((p) => p.risk);
        const frontierYs = frontier.map((p) => p.ret);
        const coeffs =
          frontier.length >= 2
            ? fitPolynomial(frontierXs, frontierYs, 2)
            : null;
        const fitX = [];
        const fitY = [];
        if (coeffs && frontier.length >= 2) {
          const minX = Math.min(...frontierXs);
          const maxX = Math.max(...frontierXs);
          const n = 120;
          for (let i = 0; i < n; i++) {
            const x = minX + ((maxX - minX) * i) / (n - 1);
            const y = evalPolynomial(coeffs, x);
            if (Number.isFinite(y)) {
              fitX.push(x);
              fitY.push(y);
            }
          }
        }
        const traces = [
          {
            type: "scatter",
            mode: "markers",
            x: points.map((p) => p.risk),
            y: points.map((p) => p.ret),
            name: "参数点（按风险预算着色）",
            marker: {
              size: 9,
              color: points.map((p) => p.budget),
              colorscale: "Viridis",
              cmin: Math.min(...points.map((p) => p.budget)),
              cmax: Math.max(...points.map((p) => p.budget)),
              colorbar: { title: "风险预算(%)" },
              line: { width: 0.5, color: "#1b2a3a" },
            },
            customdata: points.map((p) => [
              p.budget,
              p.sharpe,
              p.mdd,
              p.composite,
              p.sqnRecent100,
            ]),
            hovertemplate:
              "风险预算=%{customdata[0]:.2f}%<br>风险=%{x:.2%}<br>年化收益=%{y:.2%}<br>综合评分=%{customdata[3]:.4f}<br>Sharpe=%{customdata[1]:.4f}<br>近100笔SQN=%{customdata[4]:.4f}<br>最大回撤=%{customdata[2]:.2%}<extra></extra>",
          },
          {
            type: "scatter",
            mode: "lines+markers",
            x: frontierXs,
            y: frontierYs,
            name: "有效前沿（离散）",
            marker: { size: 8, color: "#ff7f0e" },
            line: { width: 2, color: "#ff7f0e" },
            hovertemplate:
              "有效前沿点<br>风险=%{x:.2%}<br>年化收益=%{y:.2%}<extra></extra>",
          },
        ];
        if (fitX.length > 0) {
          traces.push({
            type: "scatter",
            mode: "lines",
            x: fitX,
            y: fitY,
            name: "有效前沿拟合曲线",
            line: { width: 3, color: "#d62728", dash: "dash" },
            hovertemplate:
              "拟合前沿<br>风险=%{x:.2%}<br>拟合年化收益=%{y:.2%}<extra></extra>",
          });
        }
        if (best) {
          const bestRisk = getRiskValue(best, riskKey);
          const bestRet = metric(best, "annualized_return");
          if (bestRisk != null && bestRet != null) {
            traces.push({
              type: "scatter",
              mode: "markers",
              x: [bestRisk],
              y: [bestRet],
              name: "最佳单一设置",
              marker: { size: 13, symbol: "star", color: "#9467bd" },
              hovertemplate:
                "最佳设置<br>风险=%{x:.2%}<br>年化收益=%{y:.2%}<extra></extra>",
            });
          }
        }
        if (robustPack && robustPack.robustRows.length > 0) {
          const robustPts = robustPack.robustRows
            .map((r) => ({
              risk: getRiskValue(r, riskKey),
              ret: metric(r, "annualized_return"),
              budget: Number(r.risk_budget_pct_percent),
            }))
            .filter(
              (p) =>
                p.risk != null &&
                p.ret != null &&
                Number.isFinite(p.risk) &&
                Number.isFinite(p.ret),
            );
          if (robustPts.length > 0) {
            traces.push({
              type: "scatter",
              mode: "markers",
              x: robustPts.map((p) => p.risk),
              y: robustPts.map((p) => p.ret),
              name: "稳健候选点",
              marker: {
                size: 11,
                symbol: "diamond",
                color: "#2ca02c",
                line: { width: 1, color: "#145c2a" },
              },
              customdata: robustPts.map((p) => [p.budget]),
              hovertemplate:
                "稳健候选<br>风险预算=%{customdata[0]:.2f}%<br>风险=%{x:.2%}<br>年化收益=%{y:.2%}<extra></extra>",
            });
          }
        }
        const layout = {
          title: {
            text: "不同风险预算比例在风险-收益空间中的有效前沿（含拟合曲线）",
            font: { size: 16 },
          },
          margin: { t: 40, r: 70, b: 60, l: 70 },
          xaxis: { title: riskAxisTitle(riskKey), tickformat: ".2%" },
          yaxis: { title: "年化收益", tickformat: ".2%" },
          annotations: [],
        };
        if (fitX.length > 0) {
          const degree = Math.max(1, (coeffs || []).length - 1);
          layout.annotations.push({
            x: 0.01,
            y: 0.99,
            xref: "paper",
            yref: "paper",
            xanchor: "left",
            yanchor: "top",
            showarrow: false,
            text: `前沿拟合: ${degree}次多项式`,
            font: { size: 12, color: "#d62728" },
          });
        }
        Plotly.newPlot("sharpeLine", traces, layout, { responsive: true });
      }

      function renderTable(rows, robustPack) {
        const topN = Math.max(1, Math.floor(Number($("topN").value || "30")));
        const sorted = rows.slice().sort((a, b) => {
          const ae = objectiveEligible(a) ? 1 : 0;
          const be = objectiveEligible(b) ? 1 : 0;
          if (ae !== be) return be - ae;
          const av = objectiveScore(a);
          const bv = objectiveScore(b);
          if (av == null && bv == null) return 0;
          if (av == null) return 1;
          if (bv == null) return -1;
          return bv - av;
        });
        const cols = [
          "risk_budget_pct_percent",
          "risk_budget_pct",
          "objective_eligible",
          "objective_ineligible_reason",
          "composite_score",
          "sharpe_ratio",
          "calmar_ratio",
          "sortino_ratio",
          "ulcer_index",
          "ulcer_performance_index",
          "sqn_recent_100",
          "sqn_trade_count_total",
          "sqn_recent_100_note",
          "annualized_return",
          "cumulative_return",
          "max_drawdown",
          "status",
          "error",
        ];
        const head =
          "<tr>" +
          [
            "风险预算(%)",
            "风险预算(小数)",
            "可比",
            "不可比原因",
            "综合评分",
            "Sharpe",
            "Calmar",
            "Sortino",
            "Ulcer",
            "UPI",
            "近100笔SQN",
            "总交易数",
            "近100样本状态",
            "年化收益",
            "累计收益",
            "最大回撤",
            "状态",
            "错误",
          ]
            .map((x) => `<th>${x}</th>`)
            .join("") +
          "</tr>";
        const body = sorted
          .slice(0, topN)
          .map((r) => {
            const cells = cols.map((c) => {
              if (c === "risk_budget_pct_percent")
                return `<td>${fmtPctInput(r[c], 2)}</td>`;
              if (c === "risk_budget_pct") return `<td>${fmtNum(r[c], 4)}</td>`;
              if (c === "objective_eligible")
                return `<td>${objectiveEligible(r) ? "是" : "否"}</td>`;
              if (c === "objective_ineligible_reason") {
                const reason =
                  r?.__objectiveReason ||
                  r?.objective_ineligible_reason ||
                  String(r?.error || "");
                return `<td>${String(reason || "-").slice(0, 160)}</td>`;
              }
              if (c === "composite_score")
                return `<td>${fmtNum(objectiveScore(r), 6)}</td>`;
              if (
                c === "sharpe_ratio" ||
                c === "calmar_ratio" ||
                c === "sortino_ratio" ||
                c === "ulcer_index" ||
                c === "ulcer_performance_index" ||
                c === "sqn_recent_100"
              )
                return `<td>${fmtNum(metric(r, c), 6)}</td>`;
              if (c === "sqn_trade_count_total")
                return `<td>${fmtNum(metric(r, c), 0)}</td>`;
              if (c === "sqn_recent_100_note") {
                const n = metric(r, "sqn_trade_count_total");
                if (n == null) return "<td>-</td>";
                if (n < 30) return `<td>不足30（不参与排序）</td>`;
                if (n < 100) return `<td>不足100（当前 ${fmtNum(n, 0)}）</td>`;
                return "<td>满100+</td>";
              }
              if (c === "annualized_return" || c === "cumulative_return")
                return `<td>${fmtPct(metric(r, c), 2)}</td>`;
              if (c === "max_drawdown")
                return `<td>${fmtPct(metric(r, c), 2)}</td>`;
              if (c === "status") return `<td>${String(r.status || "-")}</td>`;
              if (c === "error")
                return `<td>${String(r.error || "").slice(0, 120)}</td>`;
              return "<td>-</td>";
            });
            const key = Number(r.risk_budget_pct_percent).toFixed(6);
            const robustHit =
              robustPack &&
              robustPack.robustKeySet &&
              robustPack.robustKeySet.has(key);
            return `<tr class="${robustHit ? "robust-row" : ""}">${cells.join("")}</tr>`;
          })
          .join("");
        $("resultTable").innerHTML =
          head + (body || `<tr><td colspan="18">暂无数据</td></tr>`);
      }

      function refreshView() {
        const state = window.__trendRbGrid;
        if (!state) return;
        const rows = toSortedRows(state.results);
        computeCompositeScores(rows);
        const best = pickBestFromRows(rows);
        const robustCfg = getRobustConfig();
        const robustPack = pickRobustCandidates(
          rows,
          robustCfg.topK,
          robustCfg.mddLimitPct,
        );
        renderMeta(state.meta, rows);
        renderBest(state.best, best);
        renderRobustInfo(robustPack, robustCfg);
        renderLine(rows, best, robustPack);
        renderTable(rows, robustPack);
      }

      async function loadFromUrl(url) {
        status("正在加载数据...");
        const resp = await fetch(url, { cache: "no-store" });
        if (!resp.ok) throw new Error(`加载失败: HTTP ${resp.status}`);
        const data = await resp.json();
        const norm = normalizeData(data);
        if (!Array.isArray(norm.results) || norm.results.length === 0) {
          throw new Error("结果为空");
        }
        window.__trendRbGrid = norm;
        refreshView();
        status(`加载完成: ${url}`);
      }

      function bindEvents() {
        $("loadUrlBtn").addEventListener("click", async () => {
          try {
            const url = String($("dataUrl").value || "").trim();
            if (!url) throw new Error("请输入 JSON URL");
            await loadFromUrl(url);
          } catch (e) {
            status(String(e));
          }
        });
        $("fileInput").addEventListener("change", async (ev) => {
          try {
            const files = ev?.target?.files;
            if (!files || files.length === 0) return;
            const txt = await files[0].text();
            const data = JSON.parse(txt);
            const norm = normalizeData(data);
            if (!Array.isArray(norm.results) || norm.results.length === 0) {
              throw new Error("结果为空");
            }
            window.__trendRbGrid = norm;
            refreshView();
            status(`已加载本地文件: ${files[0].name}`);
          } catch (e) {
            status(`读取本地文件失败: ${String(e)}`);
          }
        });
        $("refreshBtn").addEventListener("click", () => {
          try {
            refreshView();
            status("已刷新");
          } catch (e) {
            status(String(e));
          }
        });
        $("topN").addEventListener("change", refreshView);
        $("robustTopK").addEventListener("change", refreshView);
        $("robustMddLimitPct").addEventListener("change", refreshView);
      }

      function init() {
        bindEvents();
        loadFromUrl(String($("dataUrl").value || "")).catch((e) => {
          status(`自动加载失败: ${String(e)}`);
        });
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
