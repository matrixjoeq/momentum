<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>趋势浮赢分档降仓参数搜索</title>
    <link rel="stylesheet" href="/static/terminal.css" />
    <script
      defer
      src="https://cdn.plot.ly/plotly-cartesian-2.30.0.min.js"
    ></script>
    <style>
      #heatmapChart {
        width: 100%;
        height: 580px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 960px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      td,
      th {
        white-space: nowrap;
      }
      .mono {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      .robust-row {
        background: color-mix(in srgb, var(--ok, #1e7f4f) 12%, transparent);
      }
    </style>
  </head>
  <body>
    <h2>趋势浮赢分档降仓参数搜索</h2>
    <div class="muted">
      展示 `trend_r_profit_scaleout_param_search.py` 的二维网格搜索结果，研究
      `r_multiple × reduce_fraction` 组合。
    </div>
    <div class="muted" style="margin-top: 6px">
      <a href="/research">返回研究主页</a>
    </div>

    <div class="panel no-print" style="margin-top: 12px">
      <div class="row">
        <div style="min-width: 520px; flex: 1">
          <label>结果 JSON URL</label>
          <input
            id="dataUrl"
            value="/static/data/trend_r_profit_scaleout_param_search_results.json"
          />
        </div>
        <div style="display: flex; align-items: flex-end; gap: 8px">
          <button id="loadUrlBtn">加载 URL</button>
        </div>
        <div style="min-width: 320px">
          <label>或上传本地 JSON 文件</label>
          <input id="fileInput" type="file" accept=".json,application/json" />
        </div>
      </div>
    </div>

    <div class="panel no-print">
      <div class="row">
        <div>
          <label>TopN</label>
          <input id="topN" value="30" />
        </div>
        <div>
          <label>稳健候选（Sharpe前N）</label>
          <input id="robustTopK" value="5" />
        </div>
        <div>
          <label>最大回撤阈值(%)</label>
          <input id="robustMddLimitPct" value="20" />
        </div>
        <div style="display: flex; align-items: flex-end">
          <button id="refreshBtn">刷新图表与表格</button>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3 style="margin-top: 0">运行信息</h3>
        <div id="metaInfo" class="mono"></div>
      </div>
      <div class="panel">
        <h3 style="margin-top: 0">最佳单一设置（夏普最高）</h3>
        <div id="bestInfo" class="mono"></div>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">推荐稳健组合（自动标注）</h3>
      <div id="robustInfo" class="mono"></div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">二维热力图（颜色=Sharpe）</h3>
      <div id="heatmapChart"></div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0">网格结果明细</h3>
      <div style="overflow: auto">
        <table id="resultTable"></table>
      </div>
    </div>

    <div id="status" class="muted" style="margin-top: 8px"></div>

    <script>
      const $ = (id) => document.getElementById(id);

      function status(msg) {
        $("status").textContent = msg || "";
      }

      function fmtNum(v, digits = 6) {
        const x = Number(v);
        return Number.isFinite(x) ? x.toFixed(digits) : "-";
      }

      function fmtPct(v, digits = 2) {
        const x = Number(v);
        return Number.isFinite(x) ? `${(x * 100).toFixed(digits)}%` : "-";
      }

      function normalizeData(raw) {
        const meta = raw && typeof raw === "object" ? raw.meta || {} : {};
        const results =
          raw && typeof raw === "object" && Array.isArray(raw.results)
            ? raw.results
            : [];
        const best =
          raw && typeof raw === "object" && raw.best_single_setting
            ? raw.best_single_setting
            : null;
        return { meta, results, best };
      }

      function toSortedRows(rows) {
        const out = rows
          .filter(
            (x) =>
              Number.isFinite(Number(x?.r_multiple)) &&
              Number.isFinite(Number(x?.reduce_fraction)),
          )
          .slice();
        out.sort((a, b) => {
          const aR = Number(a.r_multiple);
          const bR = Number(b.r_multiple);
          if (aR !== bR) return aR - bR;
          return Number(a.reduce_fraction) - Number(b.reduce_fraction);
        });
        return out;
      }

      function metric(row, key) {
        const v = Number(row?.metrics?.[key]);
        return Number.isFinite(v) ? v : null;
      }

      function keyOf(row) {
        return `${Number(row.r_multiple).toFixed(6)}|${Number(row.reduce_fraction).toFixed(6)}`;
      }

      function pickBestFromRows(rows) {
        let best = null;
        let bestKey = null;
        rows.forEach((r) => {
          if (String(r?.status || "") !== "ok") return;
          const sharpe = metric(r, "sharpe_ratio");
          if (sharpe == null) return;
          const ann = metric(r, "annualized_return");
          const cum = metric(r, "cumulative_return");
          const mdd = metric(r, "max_drawdown");
          const k = [
            sharpe,
            ann == null ? -1e18 : ann,
            cum == null ? -1e18 : cum,
            mdd == null ? -1e18 : -Math.abs(mdd),
          ];
          if (!bestKey || k.join("|") > bestKey.join("|")) {
            bestKey = k;
            best = r;
          }
        });
        return best;
      }

      function parsePositive(value, fallback) {
        const v = Number(value);
        return Number.isFinite(v) && v > 0 ? v : fallback;
      }

      function getRobustConfig() {
        const topK = Math.max(
          1,
          Math.floor(parsePositive($("robustTopK").value, 5)),
        );
        const mddLimitPct = parsePositive($("robustMddLimitPct").value, 20);
        return { topK, mddLimitPct };
      }

      function pickRobustCandidates(rows, topK, mddLimitPct) {
        const okRows = rows.filter((r) => String(r?.status || "") === "ok");
        const sortedBySharpe = okRows.slice().sort((a, b) => {
          const av = metric(a, "sharpe_ratio");
          const bv = metric(b, "sharpe_ratio");
          if (av == null && bv == null) return 0;
          if (av == null) return 1;
          if (bv == null) return -1;
          return bv - av;
        });
        const topRows = sortedBySharpe.slice(0, Math.max(1, topK));
        const mddLimit = Math.abs(Number(mddLimitPct)) / 100.0;
        const robustRows = topRows.filter((r) => {
          const mdd = metric(r, "max_drawdown");
          return mdd != null && Math.abs(mdd) <= mddLimit;
        });
        return {
          topRows,
          robustRows,
          robustKeySet: new Set(robustRows.map((r) => keyOf(r))),
        };
      }

      function renderMeta(meta, rows) {
        const lines = [];
        lines.push(`生成时间: ${String(meta.generated_at || "-")}`);
        lines.push(`后端地址: ${String(meta.api_base_url || "-")}`);
        lines.push(`接口: ${String(meta.api_endpoint || "-")}`);
        lines.push(
          `样本总数: ${Number(meta.total_cases || rows.length || 0)} (成功 ${Number(meta.success_cases || 0)}, 失败 ${Number(meta.error_cases || 0)})`,
        );
        const ss = meta.search_space || {};
        lines.push(
          `R阈值区间: [${fmtNum(ss.r_multiple_start, 2)}, ${fmtNum(ss.r_multiple_end, 2)}]，步长 ${fmtNum(ss.r_multiple_step, 2)}`,
        );
        lines.push(
          `减仓比例区间: [${fmtNum(ss.reduce_fraction_start, 2)}, ${fmtNum(ss.reduce_fraction_end, 2)}]，步长 ${fmtNum(ss.reduce_fraction_step, 2)}`,
        );
        const ctx = meta.search_context || {};
        lines.push(`标的池: ${(ctx.selected_codes || []).join(", ")}`);
        lines.push(`策略: tsmom, 执行价: close, 引擎: legacy`);
        $("metaInfo").innerHTML = lines.map((x) => `<div>${x}</div>`).join("");
      }

      function renderBest(bestFromFile, bestFromRows) {
        const best = bestFromRows || bestFromFile || null;
        if (!best) {
          $("bestInfo").innerHTML = "<div>无可用结果</div>";
          return;
        }
        const lines = [];
        lines.push(`r_multiple: ${fmtNum(best.r_multiple, 2)}`);
        lines.push(`reduce_fraction: ${fmtNum(best.reduce_fraction, 2)}`);
        lines.push(`夏普: ${fmtNum(metric(best, "sharpe_ratio"), 6)}`);
        lines.push(`年化收益: ${fmtPct(metric(best, "annualized_return"), 2)}`);
        lines.push(`累计收益: ${fmtPct(metric(best, "cumulative_return"), 2)}`);
        lines.push(`最大回撤: ${fmtPct(metric(best, "max_drawdown"), 2)}`);
        $("bestInfo").innerHTML = lines.map((x) => `<div>${x}</div>`).join("");
      }

      function renderRobustInfo(pack, cfg) {
        const lines = [];
        lines.push(
          `筛选规则: Sharpe前 ${cfg.topK} 名 且 最大回撤绝对值 ≤ ${fmtPct(cfg.mddLimitPct / 100.0, 2)}`,
        );
        lines.push(
          `候选数量: ${pack.robustRows.length} / Top${pack.topRows.length}`,
        );
        if (pack.robustRows.length === 0) {
          lines.push("推荐稳健组合: 无（当前阈值下未命中）");
          $("robustInfo").innerHTML = lines
            .map((x) => `<div>${x}</div>`)
            .join("");
          return;
        }
        const rs = pack.robustRows.map((r) => Number(r.r_multiple));
        const fs = pack.robustRows.map((r) => Number(r.reduce_fraction));
        const best = pack.robustRows[0];
        lines.push(
          `稳健参数范围: R=[${fmtNum(Math.min(...rs), 2)}, ${fmtNum(Math.max(...rs), 2)}], 减仓比例=[${fmtNum(Math.min(...fs), 2)}, ${fmtNum(Math.max(...fs), 2)}]`,
        );
        lines.push(
          `稳健候选中最高Sharpe: ${fmtNum(metric(best, "sharpe_ratio"), 6)} @ R=${fmtNum(best.r_multiple, 2)}, 减仓比例=${fmtNum(best.reduce_fraction, 2)}`,
        );
        $("robustInfo").innerHTML = lines
          .map((x) => `<div>${x}</div>`)
          .join("");
      }

      function renderHeatmap(rows, best, robustPack) {
        const okRows = rows.filter(
          (r) =>
            String(r?.status || "") === "ok" &&
            metric(r, "sharpe_ratio") != null &&
            Number.isFinite(Number(r.r_multiple)) &&
            Number.isFinite(Number(r.reduce_fraction)),
        );
        if (okRows.length === 0) {
          Plotly.newPlot(
            "heatmapChart",
            [],
            {
              margin: { t: 30, r: 30, b: 50, l: 60 },
              annotations: [
                {
                  text: "无可绘制热力图数据",
                  x: 0.5,
                  y: 0.5,
                  xref: "paper",
                  yref: "paper",
                  showarrow: false,
                  font: { size: 14 },
                },
              ],
            },
            { responsive: true },
          );
          return;
        }

        const xs = [...new Set(okRows.map((r) => Number(r.r_multiple)))].sort(
          (a, b) => a - b,
        );
        const ys = [
          ...new Set(okRows.map((r) => Number(r.reduce_fraction))),
        ].sort((a, b) => a - b);
        const xIndex = new Map(xs.map((v, i) => [v.toFixed(6), i]));
        const yIndex = new Map(ys.map((v, i) => [v.toFixed(6), i]));
        const z = ys.map(() => xs.map(() => null));

        okRows.forEach((r) => {
          const x = Number(r.r_multiple);
          const y = Number(r.reduce_fraction);
          const sharpe = metric(r, "sharpe_ratio");
          const yi = yIndex.get(y.toFixed(6));
          const xi = xIndex.get(x.toFixed(6));
          if (yi == null || xi == null || sharpe == null) return;
          z[yi][xi] = sharpe;
        });

        const traces = [
          {
            type: "heatmap",
            x: xs,
            y: ys,
            z,
            colorscale: "Viridis",
            colorbar: { title: "Sharpe" },
            hovertemplate:
              "R阈值=%{x:.2f}<br>减仓比例=%{y:.2f}<br>Sharpe=%{z:.4f}<extra></extra>",
          },
        ];

        if (best) {
          traces.push({
            type: "scatter",
            mode: "markers",
            x: [Number(best.r_multiple)],
            y: [Number(best.reduce_fraction)],
            marker: { size: 14, symbol: "star", color: "#ff6b6b" },
            name: "最佳单一设置",
            hovertemplate:
              "最佳设置<br>R阈值=%{x:.2f}<br>减仓比例=%{y:.2f}<extra></extra>",
          });
        }

        if (robustPack && robustPack.robustRows.length > 0) {
          traces.push({
            type: "scatter",
            mode: "markers",
            x: robustPack.robustRows.map((r) => Number(r.r_multiple)),
            y: robustPack.robustRows.map((r) => Number(r.reduce_fraction)),
            marker: {
              size: 10,
              symbol: "diamond",
              color: "#2ca02c",
              line: { width: 1, color: "#145c2a" },
            },
            name: "稳健候选点",
            hovertemplate:
              "稳健候选<br>R阈值=%{x:.2f}<br>减仓比例=%{y:.2f}<extra></extra>",
          });
        }

        Plotly.newPlot(
          "heatmapChart",
          traces,
          {
            title: {
              text: "浮赢分档降仓二维参数热力图（颜色=Sharpe）",
              font: { size: 16 },
            },
            margin: { t: 44, r: 90, b: 60, l: 70 },
            xaxis: { title: "R阈值 (r_multiple)" },
            yaxis: { title: "减仓比例 (reduce_fraction)" },
          },
          { responsive: true },
        );
      }

      function renderTable(rows, robustPack) {
        const topN = Math.max(1, Math.floor(Number($("topN").value || "30")));
        const sorted = rows.slice().sort((a, b) => {
          const av = metric(a, "sharpe_ratio");
          const bv = metric(b, "sharpe_ratio");
          if (av == null && bv == null) return 0;
          if (av == null) return 1;
          if (bv == null) return -1;
          return bv - av;
        });
        const cols = [
          "r_multiple",
          "reduce_fraction",
          "sharpe_ratio",
          "annualized_return",
          "cumulative_return",
          "max_drawdown",
          "status",
          "error",
        ];
        const head =
          "<tr>" +
          [
            "R阈值",
            "减仓比例",
            "Sharpe",
            "年化收益",
            "累计收益",
            "最大回撤",
            "状态",
            "错误",
          ]
            .map((x) => `<th>${x}</th>`)
            .join("") +
          "</tr>";
        const body = sorted
          .slice(0, topN)
          .map((r) => {
            const cells = cols.map((c) => {
              if (c === "r_multiple" || c === "reduce_fraction") {
                return `<td>${fmtNum(r[c], 2)}</td>`;
              }
              if (c === "sharpe_ratio")
                return `<td>${fmtNum(metric(r, c), 6)}</td>`;
              if (c === "annualized_return" || c === "cumulative_return") {
                return `<td>${fmtPct(metric(r, c), 2)}</td>`;
              }
              if (c === "max_drawdown")
                return `<td>${fmtPct(metric(r, c), 2)}</td>`;
              if (c === "status") return `<td>${String(r.status || "-")}</td>`;
              if (c === "error")
                return `<td>${String(r.error || "").slice(0, 120)}</td>`;
              return "<td>-</td>";
            });
            const robustHit =
              robustPack &&
              robustPack.robustKeySet &&
              robustPack.robustKeySet.has(keyOf(r));
            return `<tr class="${robustHit ? "robust-row" : ""}">${cells.join("")}</tr>`;
          })
          .join("");
        $("resultTable").innerHTML =
          head + (body || `<tr><td colspan="8">暂无数据</td></tr>`);
      }

      function refreshView() {
        const state = window.__trendRScaleoutGrid;
        if (!state) return;
        const rows = toSortedRows(state.results);
        const best = pickBestFromRows(rows);
        const robustCfg = getRobustConfig();
        const robustPack = pickRobustCandidates(
          rows,
          robustCfg.topK,
          robustCfg.mddLimitPct,
        );
        renderMeta(state.meta, rows);
        renderBest(state.best, best);
        renderRobustInfo(robustPack, robustCfg);
        renderHeatmap(rows, best, robustPack);
        renderTable(rows, robustPack);
      }

      async function loadFromUrl(url) {
        status("正在加载数据...");
        const resp = await fetch(url, { cache: "no-store" });
        if (!resp.ok) throw new Error(`加载失败: HTTP ${resp.status}`);
        const data = await resp.json();
        const norm = normalizeData(data);
        if (!Array.isArray(norm.results) || norm.results.length === 0) {
          throw new Error("结果为空");
        }
        window.__trendRScaleoutGrid = norm;
        refreshView();
        status(`加载完成: ${url}`);
      }

      function bindEvents() {
        $("loadUrlBtn").addEventListener("click", async () => {
          try {
            const url = String($("dataUrl").value || "").trim();
            if (!url) throw new Error("请输入 JSON URL");
            await loadFromUrl(url);
          } catch (e) {
            status(String(e));
          }
        });
        $("fileInput").addEventListener("change", async (ev) => {
          try {
            const files = ev?.target?.files;
            if (!files || files.length === 0) return;
            const txt = await files[0].text();
            const data = JSON.parse(txt);
            const norm = normalizeData(data);
            if (!Array.isArray(norm.results) || norm.results.length === 0) {
              throw new Error("结果为空");
            }
            window.__trendRScaleoutGrid = norm;
            refreshView();
            status(`已加载本地文件: ${files[0].name}`);
          } catch (e) {
            status(`读取本地文件失败: ${String(e)}`);
          }
        });
        $("refreshBtn").addEventListener("click", () => {
          try {
            refreshView();
            status("已刷新");
          } catch (e) {
            status(String(e));
          }
        });
        $("topN").addEventListener("change", refreshView);
        $("robustTopK").addEventListener("change", refreshView);
        $("robustMddLimitPct").addEventListener("change", refreshView);
      }

      function init() {
        bindEvents();
        loadFromUrl(String($("dataUrl").value || "")).catch((e) => {
          status(`自动加载失败: ${String(e)}`);
        });
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
